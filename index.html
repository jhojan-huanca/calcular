<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Operaciones</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Operaciones Básicas</h1>
        
        <div class="input-group">
            <input type="number" id="num1" placeholder="Número 1">
            <input type="number" id="num2" placeholder="Número 2">
            <button onclick="calcular()">Calcular Todo</button>
        </div>

        <div id="resultados" class="resultados-box">
            <p>Suma: <span id="suma">-</span></p>
            <p>Resta: <span id="resta">-</span></p>
            <p>Multiplicación: <span id="mult">-</span></p>
            <p>División: <span id="divi">-</span></p>
        </div>
    </div>

    <script>
        function calcular() {
            // Convertimos el texto a número usando Number()
            const n1 = Number(document.getElementById('num1').value);
            const n2 = Number(document.getElementById('num2').value);

            // Realizamos las operaciones
            document.getElementById('suma').textContent = n1 + n2;
            document.getElementById('resta').textContent = n1 - n2;
            document.getElementById('mult').textContent = n1 * n2;
            
            // Validación simple para la división por cero
            if (n2 !== 0) {
                document.getElementById('divi').textContent = n1 / n2;
            } else {
                document.getElementById('divi').textContent = "Error (Div/0)";
            }
        }
    </script>
</body>
</html>
